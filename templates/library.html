<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contracts Library — Hotel Contract Parser</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --bg:       #0d1117;
        --surface:  #161b22;
        --surface2: #1c2128;
        --border:   #30363d;
        --text:     #e6edf3;
        --muted:    #7d8590;
        --accent:   #58a6ff;
        --accent2:  #3fb950;
        --rose:     #f85149;
        --amber:    #d29922;
        --teal:     #39d3bb;
        --purple:   #bc8cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Outfit', sans-serif;
        min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
        background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
        border-bottom: 1px solid var(--border);
        padding: 28px 40px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(12px);
    }
    .header-left h1 {
        font-family: 'Playfair Display', serif;
        font-size: 1.6em;
        background: linear-gradient(135deg, var(--accent), var(--teal));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .header-left p {
        font-size: .8em;
        color: var(--muted);
        margin-top: 3px;
    }
    .header-actions { display: flex; gap: 10px; }
    .btn {
        padding: 9px 18px;
        border-radius: 8px;
        border: none;
        font-family: 'Outfit', sans-serif;
        font-size: .87em;
        font-weight: 600;
        cursor: pointer;
        transition: all .2s;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        text-decoration: none;
    }
    .btn-primary { background: linear-gradient(135deg,#1565c0,#0288d1); color:#fff; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(88,166,255,.3); }
    .btn-ghost {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Controls bar ───────────────────────────────── */
    .controls {
        padding: 22px 40px;
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
    }
    .search-wrap {
        position: relative;
        flex: 1;
        min-width: 200px;
        max-width: 380px;
    }
    .search-wrap .icon {
        position: absolute;
        left: 12px; top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: .95em;
        pointer-events: none;
    }
    .search-input {
        width: 100%;
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: 'Outfit', sans-serif;
        font-size: .9em;
        padding: 9px 13px 9px 36px;
        outline: none;
        transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    .filter-sel {
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: 'Outfit', sans-serif;
        font-size: .87em;
        padding: 9px 13px;
        outline: none;
        cursor: pointer;
        transition: border-color .2s;
    }
    .filter-sel:focus { border-color: var(--accent); }
    .filter-sel option { background: var(--surface2); }

    .controls-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .count-badge {
        background: rgba(88,166,255,.12);
        border: 1px solid rgba(88,166,255,.25);
        color: var(--accent);
        border-radius: 20px;
        padding: 4px 12px;
        font-size: .8em;
        font-weight: 600;
    }

    /* ── Main content ───────────────────────────────── */
    .page { max-width: 1300px; margin: 0 auto; padding: 32px 40px 60px; }

    /* ── Empty / loading states ─────────────────────── */
    .state-box {
        text-align: center;
        padding: 80px 20px;
        color: var(--muted);
    }
    .state-box .icon { font-size: 3em; margin-bottom: 16px; }
    .state-box h3 { font-family: 'Playfair Display', serif; font-size: 1.2em; color: var(--text); margin-bottom: 8px; }
    .state-box p  { font-size: .87em; }

    /* ── Cards grid ─────────────────────────────────── */
    .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 20px;
        margin-bottom: 36px;
    }

    .contract-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        transition: border-color .2s, transform .2s, box-shadow .2s;
        display: flex;
        flex-direction: column;
    }
    .contract-card:hover {
        border-color: #40464e;
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }

    /* Card colour accent strip based on source */
    .card-strip {
        height: 3px;
        background: linear-gradient(90deg, var(--accent), var(--teal));
    }
    .card-strip.pdf  { background: linear-gradient(90deg, var(--purple), var(--accent)); }
    .card-strip.manual { background: linear-gradient(90deg, var(--accent2), var(--teal)); }
    .card-strip.legacy { background: linear-gradient(90deg, var(--amber), var(--rose)); }

    .card-body { padding: 18px 20px 14px; flex: 1; }
    .card-hotel {
        font-family: 'Playfair Display', serif;
        font-size: 1.05em;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 6px;
        line-height: 1.3;
    }
    .card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
    }
    .tag {
        font-size: .72em;
        font-weight: 600;
        padding: 3px 9px;
        border-radius: 20px;
        letter-spacing: .03em;
    }
    .tag-group   { background: rgba(88,166,255,.12);  color: var(--accent); border: 1px solid rgba(88,166,255,.2); }
    .tag-loc     { background: rgba(57,211,187,.1);   color: var(--teal);   border: 1px solid rgba(57,211,187,.2); }
    .tag-plan    { background: rgba(210,153,34,.1);   color: var(--amber);  border: 1px solid rgba(210,153,34,.2); }
    .tag-pdf     { background: rgba(188,140,255,.1);  color: var(--purple); border: 1px solid rgba(188,140,255,.2); }
    .tag-manual  { background: rgba(63,185,80,.1);    color: var(--accent2);border: 1px solid rgba(63,185,80,.2); }

    .card-stats {
        display: flex;
        gap: 14px;
        font-size: .78em;
        color: var(--muted);
        margin-bottom: 4px;
    }
    .card-stats span { display: flex; align-items: center; gap: 4px; }

    .card-date {
        font-size: .74em;
        color: var(--muted);
        margin-top: 6px;
    }

    .card-actions {
        padding: 12px 20px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        background: var(--surface2);
    }
    .card-btn {
        flex: 1;
        min-width: 70px;
        padding: 7px 10px;
        border-radius: 7px;
        border: none;
        font-family: 'Outfit', sans-serif;
        font-size: .78em;
        font-weight: 600;
        cursor: pointer;
        transition: all .18s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        text-decoration: none;
    }
    .cb-edit   { background: rgba(88,166,255,.12); color: var(--accent); border: 1px solid rgba(88,166,255,.2); }
    .cb-edit:hover   { background: rgba(88,166,255,.22); }
    .cb-csv    { background: rgba(63,185,80,.1);   color: var(--accent2); border: 1px solid rgba(63,185,80,.2); }
    .cb-csv:hover    { background: rgba(63,185,80,.2); }
    .cb-xlsx   { background: rgba(57,211,187,.1);  color: var(--teal); border: 1px solid rgba(57,211,187,.2); }
    .cb-xlsx:hover   { background: rgba(57,211,187,.2); }
    .cb-del    { background: rgba(248,81,73,.08);  color: var(--rose); border: 1px solid rgba(248,81,73,.18); }
    .cb-del:hover    { background: rgba(248,81,73,.2); }
    .cb-disabled { opacity: .35; cursor: not-allowed; }

    /* ── Pagination ─────────────────────────────────── */
    .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 8px;
    }
    .pg-btn {
        min-width: 36px; height: 36px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 7px;
        color: var(--text);
        font-family: 'Outfit', sans-serif;
        font-size: .85em;
        font-weight: 600;
        cursor: pointer;
        transition: all .18s;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 10px;
    }
    .pg-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .pg-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .pg-btn:disabled { opacity: .35; cursor: not-allowed; }
    .pg-ellipsis { color: var(--muted); padding: 0 4px; }

    /* ── Delete confirmation modal ──────────────────── */
    .modal-overlay {
        display: none;
        position: fixed; inset: 0;
        background: rgba(0,0,0,.7);
        z-index: 999;
        align-items: center;
        justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 28px 32px;
        max-width: 420px;
        width: 90%;
        text-align: center;
    }
    .modal h3 { font-family: 'Playfair Display', serif; font-size: 1.1em; margin-bottom: 10px; color: var(--rose); }
    .modal p  { font-size: .87em; color: var(--muted); margin-bottom: 22px; line-height: 1.5; }
    .modal-actions { display: flex; gap: 10px; justify-content: center; }

    /* ── Toast ──────────────────────────────────────── */
    .toast {
        position: fixed;
        bottom: 28px; right: 28px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 13px 20px;
        font-size: .87em;
        font-weight: 500;
        display: none;
        align-items: center;
        gap: 10px;
        z-index: 9999;
        box-shadow: 0 8px 32px rgba(0,0,0,.4);
        animation: slideIn .25s ease;
    }
    .toast.show { display: flex; }
    .toast.ok  { border-color: rgba(63,185,80,.4);  color: #7ee787; }
    .toast.err { border-color: rgba(248,81,73,.4);  color: #ff7b72; }
    @keyframes slideIn { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }

    @media(max-width:640px) {
        .header, .controls, .page { padding-left: 20px; padding-right: 20px; }
        .cards-grid { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-left">
        <h1>🏨 Contracts Library</h1>
        <p>All generated hotel contracts — search, filter, download or re-edit</p>
    </div>
    <div class="header-actions">
        <a href="{{ url_for('index') }}" class="btn btn-ghost">← Back to Parser</a>
        <button class="btn btn-primary" onclick="loadContracts()">↻ Refresh</button>
    </div>
</div>

<!-- Controls -->
<div class="controls">
    <div class="search-wrap">
        <span class="icon">🔍</span>
        <input type="text" class="search-input" id="searchInput"
               placeholder="Search hotel, group, location…" oninput="onFilter()">
    </div>
    <select class="filter-sel" id="filterSource" onchange="onFilter()">
        <option value="">All sources</option>
        <option value="manual">Manual entry</option>
        <option value="pdf">PDF upload</option>
        <option value="legacy">Legacy</option>
    </select>
    <select class="filter-sel" id="filterPlan" onchange="onFilter()">
        <option value="">All meal plans</option>
        <option value="BB">BB — Bed &amp; Breakfast</option>
        <option value="HB">HB — Half Board</option>
        <option value="FB">FB — Full Board</option>
        <option value="RO">RO — Room Only</option>
    </select>
    <select class="filter-sel" id="sortBy" onchange="onFilter()">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="name_az">Hotel name A→Z</option>
        <option value="name_za">Hotel name Z→A</option>
    </select>
    <div class="controls-right">
        <span class="count-badge" id="countBadge">0 contracts</span>
    </div>
</div>

<!-- Main -->
<div class="page">
    <div id="stateBox" class="state-box">
        <div class="icon">⏳</div>
        <h3>Loading contracts…</h3>
        <p>Scanning output folders</p>
    </div>
    <div class="cards-grid" id="cardsGrid" style="display:none;"></div>
    <div class="pagination" id="pagination"></div>
</div>

<!-- Delete modal -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <h3>🗑 Delete Contract?</h3>
        <p id="deleteMsg">This will permanently remove the folder and all its files. This cannot be undone.</p>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeDeleteModal()">Cancel</button>
            <button class="btn" style="background:var(--rose);color:#fff;" onclick="confirmDelete()">Yes, Delete</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const PER_PAGE = 12;
let allContracts = [];
let filtered     = [];
let currentPage  = 1;
let pendingDelete = null;

/* ── Load ─────────────────────────────────────────── */
async function loadContracts() {
    showState('⏳', 'Loading contracts…', 'Scanning output folders');
    document.getElementById('cardsGrid').style.display = 'none';
    document.getElementById('pagination').innerHTML = '';
    try {
        const res  = await fetch('/api/contracts');
        allContracts = await res.json();
        onFilter();
    } catch(e) {
        showState('❌', 'Could not load contracts', e.message);
    }
}

/* ── Filter + Sort ────────────────────────────────── */
function onFilter() {
    const q      = document.getElementById('searchInput').value.toLowerCase().trim();
    const src    = document.getElementById('filterSource').value;
    const plan   = document.getElementById('filterPlan').value;
    const sortBy = document.getElementById('sortBy').value;

    filtered = allContracts.filter(c => {
        if (src  && c.source    !== src)  return false;
        if (plan && c.base_plan !== plan) return false;
        if (q) {
            const hay = [c.hotel_name, c.hotel_group, c.location, c.base_plan, c.contract_year]
                          .join(' ').toLowerCase();
            if (!hay.includes(q)) return false;
        }
        return true;
    });

    filtered.sort((a, b) => {
        if (sortBy === 'oldest') return (a.created_at||'') > (b.created_at||'') ? 1 : -1;
        if (sortBy === 'name_az') return (a.hotel_name||'').localeCompare(b.hotel_name||'');
        if (sortBy === 'name_za') return (b.hotel_name||'').localeCompare(a.hotel_name||'');
        return (a.created_at||'') < (b.created_at||'') ? 1 : -1; // newest
    });

    currentPage = 1;
    render();
}

/* ── Render ───────────────────────────────────────── */
function render() {
    const grid = document.getElementById('cardsGrid');
    const box  = document.getElementById('stateBox');

    document.getElementById('countBadge').textContent =
        filtered.length + ' contract' + (filtered.length !== 1 ? 's' : '');

    if (!filtered.length) {
        grid.style.display = 'none';
        showState('🔍', 'No contracts found',
            allContracts.length
                ? 'Try adjusting your search or filters'
                : 'Generate your first contract to see it here');
        document.getElementById('pagination').innerHTML = '';
        return;
    }

    box.style.display  = 'none';
    grid.style.display = 'grid';

    const total  = filtered.length;
    const pages  = Math.ceil(total / PER_PAGE);
    const start  = (currentPage - 1) * PER_PAGE;
    const slice  = filtered.slice(start, start + PER_PAGE);

    grid.innerHTML = slice.map(buildCard).join('');
    renderPagination(pages);
}

function buildCard(c) {
    const name      = c.hotel_name   || '(unnamed hotel)';
    const group     = c.hotel_group  || 'Single';
    const loc       = c.location     || '';
    const plan      = c.base_plan    || '';
    const src       = c.source       || 'legacy';
    const rows      = c.row_count    != null ? c.row_count + ' rows' : '';
    const yr        = c.contract_year|| '';
    const dir       = c.output_dir;
    const csvFile   = c.csv_file;
    const xlsxFile  = c.xlsx_file;
    const hasEdit   = c.has_entry_data;
    const date      = c.created_at
        ? new Date(c.created_at).toLocaleDateString('en-GB',
            {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})
        : '';

    const srcLabel  = src === 'pdf' ? '📄 PDF' : src === 'manual' ? '✏️ Manual' : '📦 Legacy';
    const srcClass  = src === 'pdf' ? 'tag-pdf' : src === 'manual' ? 'tag-manual' : 'tag-plan';

    const safeDir = encodeURIComponent(dir || '');
    const xlsxBtn = xlsxFile
        ? `<a class="card-btn cb-xlsx" href="/download/${safeDir}/${encodeURIComponent(xlsxFile)}" download title="Download Excel">📊 Excel</a>`
        : `<span class="card-btn cb-xlsx cb-disabled" title="No Excel file">📊 Excel</span>`;

    const csvBtn = csvFile
        ? `<a class="card-btn cb-csv" href="/download/${safeDir}/${encodeURIComponent(csvFile)}" download title="Download CSV">📥 CSV</a>`
        : '';

    const editBtn = hasEdit
        ? `<button class="card-btn cb-edit" data-action="edit" data-dir="${esc(dir)}" title="Re-load into manual form">✏️ Edit</button>`
        : `<span class="card-btn cb-edit cb-disabled" title="No form data saved (PDF-only contract)">✏️ Edit</span>`;

    return `
    <div class="contract-card" data-dir="${esc(dir)}">
        <div class="card-strip ${src}"></div>
        <div class="card-body">
            <div class="card-hotel">${esc(name)}${yr ? ' <span style="font-size:.75em;color:var(--muted);font-family:Outfit,sans-serif;font-weight:400;">('+yr+')</span>' : ''}</div>
            <div class="card-meta">
                ${group !== 'Single' ? `<span class="tag tag-group">🏢 ${esc(group)}</span>` : `<span class="tag tag-group">🏨 Single</span>`}
                ${loc  ? `<span class="tag tag-loc">📍 ${esc(loc)}</span>` : ''}
                ${plan ? `<span class="tag tag-plan">${esc(plan)}</span>` : ''}
                <span class="tag ${srcClass}">${srcLabel}</span>
            </div>
            <div class="card-stats">
                ${rows ? `<span>📋 ${rows}</span>` : ''}
                <span>📁 ${esc(dir)}</span>
            </div>
            ${date ? `<div class="card-date">🕐 ${date}</div>` : ''}
        </div>
        <div class="card-actions">
            ${editBtn}
            ${csvBtn}
            ${xlsxBtn}
            <button class="card-btn cb-del" data-action="delete" data-dir="${esc(dir)}" data-name="${esc(name)}" title="Delete folder">🗑 Delete</button>
        </div>
    </div>`;
}

function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── Pagination ───────────────────────────────────── */
function renderPagination(pages) {
    const el = document.getElementById('pagination');
    if (pages <= 1) { el.innerHTML = ''; return; }

    let html = `<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    const range = pageRange(currentPage, pages);
    range.forEach(p => {
        if (p === '…') {
            html += `<span class="pg-ellipsis">…</span>`;
        } else {
            html += `<button class="pg-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
        }
    });
    html += `<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
    el.innerHTML = html;
}

function pageRange(cur, total) {
    if (total <= 7) return Array.from({length:total},(_,i)=>i+1);
    const r = [1];
    if (cur > 3) r.push('…');
    for (let i = Math.max(2,cur-1); i <= Math.min(total-1,cur+1); i++) r.push(i);
    if (cur < total-2) r.push('…');
    r.push(total);
    return r;
}

function goPage(p) {
    const pages = Math.ceil(filtered.length / PER_PAGE);
    if (p < 1 || p > pages) return;
    currentPage = p;
    render();
    window.scrollTo({top: 0, behavior:'smooth'});
}

/* ── Edit ─────────────────────────────────────────── */
async function editContract(dir) {
    try {
        const res  = await fetch(`/api/contracts/${encodeURIComponent(dir)}/entry_data`);
        const data = await res.json();
        if (data.error) { showToast('err', '❌ ' + data.error); return; }
        // Store in sessionStorage as a fast path, and include the folder in the URL
        // so the parser page can fetch the data directly if storage is unavailable.
        sessionStorage.setItem('reloadContract', JSON.stringify(data));
        window.location.href = `/?reload=${encodeURIComponent(dir)}`;
    } catch(e) {
        showToast('err', '❌ Failed to load contract data');
    }
}

/* ── Delete ───────────────────────────────────────── */
function deleteContract(dir, name) {
    if (!dir || dir === 'null' || dir === 'undefined') {
        alert('Cannot delete: invalid folder');
        return;
    }
    pendingDelete = dir;
    document.getElementById('deleteMsg').textContent = `"${name}" and all its files will be permanently deleted. This cannot be undone.`;
    document.getElementById('deleteModal').classList.add('show');
}

function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('show');
    pendingDelete = null;
}

async function confirmDelete() {
    if (!pendingDelete) return;
    const dirToDelete = pendingDelete;
    closeDeleteModal();
    try {
        const res = await fetch(`/api/contracts/${encodeURIComponent(dirToDelete)}`, {method:'DELETE'});
        const r   = await res.json();
        if (r.success) {
            allContracts = allContracts.filter(c => c.output_dir !== dirToDelete);
            showToast('ok', '✅ Contract deleted');
            onFilter();
        } else {
            showToast('err', '❌ ' + (r.error || 'Delete failed'));
        }
    } catch(e) {
        showToast('err', '❌ Network error');
    }
}

/* ── Helpers ──────────────────────────────────────── */
function showState(icon, title, sub) {
    const box = document.getElementById('stateBox');
    box.style.display = 'block';
    box.innerHTML = `<div class="icon">${icon}</div><h3>${title}</h3><p>${sub}</p>`;
}

let toastTimer;
function showToast(type, msg) {
    const t = document.getElementById('toast');
    t.className = 'toast show ' + type;
    t.textContent = msg;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// Close modal on overlay click
document.getElementById('deleteModal').addEventListener('click', e => {
    if (e.target === document.getElementById('deleteModal')) closeDeleteModal();
});

document.getElementById('cardsGrid').addEventListener('click', e => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;

    const dir = btn.dataset.dir || '';
    if (btn.dataset.action === 'edit') {
        editContract(dir);
    } else if (btn.dataset.action === 'delete') {
        deleteContract(dir, btn.dataset.name || '');
    }
});

loadContracts();
</script>
